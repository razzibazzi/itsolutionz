<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Attendance System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="theme.css" rel="stylesheet">
    <style>
        .alert { border-radius: 10px; border: none; }
    </style>
    <script defer src="index.js"></script>
    <script defer>
        document.addEventListener('DOMContentLoaded', function() {
            // Ensure login section visible if using shared script
            const loginSection = document.getElementById('loginSection');
            if (loginSection) loginSection.classList.add('active');
        });
    </script>
    <link rel="preload" href="index.js" as="script">
    <link rel="preload" href="dashboard.html" as="document">
    <link rel="preload" href="index.php" as="fetch">
    <link rel="preload" href="connection.php" as="fetch">
    <link rel="preload" href="headers.php" as="fetch">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" as="style">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" as="script">
    <script>window.addEventListener('load',()=>setTimeout(()=>window.scrollTo(0,1),0));</script>
</head>
<body class="login-page">
    <div id="loginSection" class="section active">
        <div class="login-container">
            <div class="login-header">
                <i class="fas fa-graduation-cap fa-3x mb-3"></i>
                <h3>Faculty Attendance System</h3>
                <p class="mb-0">College of Computing</p>
            </div>
            <div class="login-body">
                <div id="errorAlert" class="alert alert-danger" role="alert" style="display: none;">
                    <i class="fas fa-exclamation-triangle me-2"></i><span id="errorMessage"></span>
                </div>
                <form id="loginForm" method="post" action="index.php">
                    <input type="hidden" name="operation" value="login">
                    <input type="hidden" name="redirect" value="1">
                    <div class="mb-3">
                        <label for="schoolId" class="form-label"><i class="fas fa-id-card me-2"></i>School ID</label>
                        <input type="text" class="form-control" id="schoolId" name="schoolId" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="password-field-wrap">
                            <input type="password" class="form-control password-field-input" id="password" name="password" required autocomplete="current-password">
                            <button class="btn password-toggle-btn" type="button" id="togglePassword" aria-label="Show password" title="Show password">
                                <i class="fas fa-eye" id="togglePasswordIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-login w-100" id="loginBtn"><i class="fas fa-sign-in-alt me-2"></i>Login</button>
                    <div class="loading text-center mt-3">
                        <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <small class="text-muted"><i class="fas fa-info-circle me-1"></i>Use your School ID and Password to access the system</small>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
